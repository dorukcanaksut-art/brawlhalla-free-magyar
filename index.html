<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Brawlhalla Reflex Test</title>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        #box {
            width: 100px;
            height: 100px;
            background: lime;
            position: absolute;
            cursor: pointer;
            border-radius: 10px;
            z-index: 10;
        }

        img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            display: none; /* Başlangıçta gizli */
        }
    </style>
</head>
<body>

    <h1 id="title">Brawlhalla Reflex Test</h1>
    <p id="desc">Yeşil kareye en hızlı şekilde bas!</p>

    <div id="box"></div>
    
    <img id="jumpscare-img" src="scary%20teeth.jpg">

    <audio id="scream" src="five-nights-at-freddys-full-scream-sound_2.mp3"></audio>

    <script>
        let box = document.getElementById("box");
        let scream = document.getElementById("scream");
        let img = document.getElementById("jumpscare-img");
        let title = document.getElementById("title");
        let desc = document.getElementById("desc");

        function moveBox() {
            let x = Math.random() * (window.innerWidth - 100);
            let y = Math.random() * (window.innerHeight - 150) + 50;
            box.style.left = x + "px";
            box.style.top = y + "px";
        }

        moveBox();

        box.onclick = function() {
            // Kutuyu ve yazıları gizle
            box.style.display = "none";
            title.style.display = "none";
            desc.style.display = "none";
            
            // Fotoğrafı göster ve sesi çal
            img.style.display = "block";
            scream.play();
        };
    </script>

</body>
</html>
