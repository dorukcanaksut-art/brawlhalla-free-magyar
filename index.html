<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Brawlhalla Reflex Test</title>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden; /* Taşmaları engellemek için */
            height: 100vh;
        }

        #box {
            width: 100px;
            height: 100px;
            background: lime;
            position: absolute;
            cursor: pointer;
            border-radius: 10px;
        }

        img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <h1 id="title">Brawlhalla Reflex Test</h1>
    <p id="desc">Yeşil kareye en hızlı şekilde bas!</p>

    <div id="box"></div>

    <audio id="scream" src="https://www.myinstants.com/media/sounds/movie_1.mp3"></audio>

    <script>
        let box = document.getElementById("box");
        let scream = document.getElementById("scream");

        // Kutuyu rastgele konuma gönder (Ekran sınırları içinde)
        function moveBox() {
            let x = Math.random() * (window.innerWidth - 100);
            let y = Math.random() * (window.innerHeight - 150) + 50;
            box.style.left = x + "px";
            box.style.top = y + "px";
        }

        moveBox();

        box.onclick = function() {
            // Jumpscare ekranı
            document.body.innerHTML = "<img src='scary%20teeth.jpg'>";
            
            // Sesi çal (Tarayıcı engellemezse çalışacaktır)
            scream.play().catch(e => console.log("Ses çalınamadı, etkileşim gerekiyor."));
        };
    </script>

</body>
</html>
